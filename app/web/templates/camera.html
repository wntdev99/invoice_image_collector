<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ camera.name }} — {{ app_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
  <header class="topbar">
    <a href="/" class="back-link">← 뒤로</a>
    <h1>{{ camera.name }}</h1>
    <span class="device-path">{{ camera.device_path }}</span>
  </header>
  <main class="camera-page" data-camera-id="{{ camera.id }}">
    <section class="stream-wrap">
      <img id="stream" src="/stream/{{ camera.id }}" alt="live preview" />
      <div id="stream-status" class="stream-status">스트림 연결 중…</div>
    </section>
    <aside class="control-panel">
      <h2 class="panel-title">컨트롤</h2>

      <section class="control-group">
        <h3 class="group-title">스트림 해상도</h3>
        <select id="resolution-select">
          {% for w, h in camera.capabilities.resolutions %}
          <option value="{{ w }}x{{ h }}">{{ w }}×{{ h }}</option>
          {% endfor %}
        </select>
        <p id="resolution-status" class="hint" hidden></p>
      </section>

      <section class="control-group" id="focus-group">
        <div class="control-row">
          <label>포커스 모드</label>
          <button id="af-toggle" type="button" disabled title="자동 포커스 지원 시 활성화">AF</button>
        </div>
        <div class="control-row">
          <label for="focus-slider">수동 포커스</label>
          <output id="focus-value" for="focus-slider">-</output>
        </div>
        <input type="range" id="focus-slider" disabled />
        <p id="focus-hint" class="hint" hidden></p>
      </section>

      <section class="control-group capture-group">
        <h3 class="group-title">촬영</h3>
        <div class="capture-row">
          <input type="text" id="label-input" placeholder="라벨" value="capture" maxlength="64">
          <select id="ext-select">
            <option value="jpg" selected>jpg</option>
            <option value="webp">webp</option>
          </select>
          <button id="capture-btn" type="button">촬영</button>
        </div>
        <p id="capture-status" class="hint" hidden></p>
      </section>

      <dl class="meta">
        <dt>id</dt><dd>{{ camera.id }}</dd>
        <dt>serial</dt><dd>{{ camera.serial or "-" }}</dd>
        <dt>vendor/product</dt><dd>{{ camera.vendor_id }}:{{ camera.product_id }}</dd>
      </dl>
    </aside>
  </main>
  <script src="{{ url_for('static', path='/js/camera.js') }}" defer></script>
</body>
</html>
